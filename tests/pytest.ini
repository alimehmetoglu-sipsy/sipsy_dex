[tool:pytest]
# Pytest configuration for DexAgent testing

# Test discovery
testpaths = 
    tests/integration
    tests/performance
    tests/e2e

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests that test multiple components together
    performance: Performance and load tests
    e2e: End-to-end tests using browser automation
    slow: Tests that take longer than 30 seconds
    websocket: Tests that involve WebSocket communication
    database: Tests that require database access
    api: Tests that test API endpoints
    smoke: Quick smoke tests for basic functionality
    regression: Regression tests for known issues
    critical: Critical path tests that must pass

# Output
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --show-capture=no
    --color=yes
    --durations=10

# Test timeouts
timeout = 300
timeout_method = thread

# Minimum Python version
minversion = 3.8

# Test collection
collect_ignore = [
    "setup.py",
    "conftest.py"
]

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:requests.*
    ignore::UserWarning:urllib3.*

# Test ordering
# Slow tests should run last
testmon_off = true

# Parallel testing
# addopts = -n auto  # Uncomment to enable parallel testing with pytest-xdist